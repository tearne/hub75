[build]
target = "thumbv8m.main-none-eabihf"

[target.thumbv8m.main-none-eabihf]
runner = "probe-rs run --chip RP235x"
rustflags = [
    "-C", "link-arg=--nmagic",         # don't page-align sections
    "-C", "link-arg=-Tlink.x",         # use cortex-m-rt linker script
    "-C", "link-arg=-Tdefmt.x",        # defmt symbol table
]

[env]
DEFMT_LOG = "debug"
